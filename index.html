        <div class="ch-line"><img class="ch-logo" src="${L[s.chLogo]}" alt="${s.ch}"><span style="color:${T.textSec}">${s.ch} ｜ ${s.day} 🇰🇷 ${s.timeKST} KST → 🇹🇼 ${s.timeTW}${s.timeNote?` (${s.timeNote})`:''}</span></div>

    <div class="sec">
      <div class="sec-title" style="color:${T.text};border-color:${A}">三冠王制度</div>
      <div class="${s.triple==='有三冠王畢業制'?'tc-badge tc-yes':'tc-badge tc-no'}">${s.triple}</div>
      <div class="tc-note" style="color:${T.textSec}">${s.tripleNote}</div>
      ${nostageHTML}
      <div class="tc-ex-label" style="color:${T.textSec}">📅 以TAEYANG 5/18發行《QUINTESSENCE》為例${s.noStage?'（無回歸舞台，直接依數據計分）':'（假設每週均得一位）'}</div>
      <div class="timeline"><div class="tl-track">${tlHTML}</div></div>
    </div>
    <div class="divider" style="background:${T.border}"></div>
    <div class="sec">
      <div class="sec-title" style="color:${T.text};border-color:${A}">各項評分配比（依節目螢幕顯示順序）</div>
      ${mnetNoteHTML}
      <div class="score-list">${scoreRowsHTML}</div>
      <div class="score-detail">${detailHTML}</div>
    </div>
    <div class="divider" style="background:${T.border}"></div>
    <div class="sec">
      <div class="sec-title" style="color:${T.text};border-color:${A}">投票機制</div>
      <div class="vote-grid">

      </div>
    </div>
    <div class="divider" style="background:${T.border}"></div>
    <div class="sec">

tabsEl.addEventListener('click',e=>{
  const btn=e.target.closest('.tab-btn');if(!btn)return;
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active');b.style.background='';const sv=D.find(x=>x.id===b.dataset.id);b.querySelector('.tab-day').style.color=sv.color;b.querySelectorAll('.tab-name,.tab-time').forEach(el=>el.style.color='');});
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('visible'));
  btn.classList.add('active');
  const sv=D.find(x=>x.id===btn.dataset.id);
  btn.style.background=sv.color;
  btn.querySelectorAll('span').forEach(el=>el.style.color=sv.activeTextColor);
  document.getElementById('panel-'+btn.dataset.id).classList.add('visible');
});
